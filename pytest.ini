[pytest]
testpaths = tests/unit tests/integration
python_files = test_*.py
addopts = -ra -vv --tb=long --showlocals
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
markers =
	integration: tests that use live API keys or external connectivity
	live_api: tests that hit real provider endpoints
